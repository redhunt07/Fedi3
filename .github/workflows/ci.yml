name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  hardening-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Release hardening checks
        run: bash scripts/check_release_hardening.sh

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        run: |
          cargo test --workspace

  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libsecret-1-dev libmpv-dev libcdio-dev \
            libavcodec-dev
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter tests
        working-directory: app
        run: |
          flutter --version
          flutter pub get
          flutter analyze
          flutter test
      - name: Linux preflight gate
        run: FEDI3_PREFLIGHT_ONLY=1 bash scripts/release_build_linux.sh

  relay-smoke:
    runs-on: ubuntu-latest
    needs: [hardening-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Start relay stack
        run: docker compose up -d --build relay dragonfly postgres meilisearch p2p_infra
      - name: Wait for relay
        run: |
          for _ in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:8787/healthz -H "Authorization: Bearer dev-admin-token-1234567890" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --tail=200 relay
          exit 1
      - name: Relay smoke test
        run: bash scripts/relay_smoke_test.sh http://127.0.0.1:8787 dev-admin-token-1234567890 1
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200
